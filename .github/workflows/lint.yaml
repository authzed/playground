---
name: "Run Linters and Typechecking"
on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "*"
jobs:
  test:
    name: "Run Linters and Typechecking"
    runs-on: "depot-ubuntu-24.04-small"
    steps:
      - uses: "actions/checkout@v6"
      - uses: "pnpm/action-setup@v6"
        with:
          cache: true
      - name: "Install dependencies"
        run: "pnpm install"
      - name: "Run Eslint"
        run: "pnpm run lint"
      - name: "Run formatting check"
        run: "pnpm run format:check"
